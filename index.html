function calcStandings() {
  // Build placeholder map from standings (1A, 2A etc)
  const st = {};
  for (const t of Object.keys(GROUP_OF)) st[t]={pts:0,gf:0,ga:0,gd:0,played:0};

    const h=r.home,a=r.away;

    st[h].gf+=r.homeGoals;st[h].ga+=r.awayGoals;st[h].gd+=r.homeGoals-r.awayGoals;st[h].played++;
    st[a].gf+=r.awayGoals;st[a].ga+=r.homeGoals;st[a].gd+=r.awayGoals-r.homeGoals;st[a].played++;

  const grpTeams={};

    if (r.pens) {
      winner = r.pens.home > r.pens.away ? r.home : r.away;
    } else if (r.et) {
      winner = r.et.home > r.et.away ? r.home : r.away;
    } else if (r.homeGoals > r.awayGoals) {
      winner = r.home;
    } else if (r.awayGoals > r.homeGoals) {
      winner = r.away;
    }
    if (winner) {
      const loser = winner === r.home ? r.away : r.home;
      knockoutWinners.add(winner);
      knockoutLosers.add(loser);
    }
  }

  const hasPlayed = new Set([...Object.keys(groupGamesPlayed), ...knockoutResults.flatMap(r=>[r.home,r.away])]);

  const elim = new Set();
  for(const t of hasPlayed){
    if(knockoutLosers.has(t)){
      elim.add(t); // lost a knockout = out
    } else if(!knockoutWinners.has(t) && !stillIn.has(t) && (groupGamesPlayed[t]||0) >= 3){
      elim.add(t); // finished group stage, not in upcoming, never won a knockout = out
    }
  }
  return{elim,pm};
}

function resolveTeam(name){return placeholderMap[name]||name;}

function computeGoals(){
  const g={};
  for(const r of results){g[r.home]=(g[r.home]||0)+r.homeGoals;g[r.away]=(g[r.away]||0)+r.awayGoals;}
  return g;
}

function computeScores(gm){
  return Object.entries(PLAYERS).map(([name,teams])=>({
    name,
    pts:Object.values(teams).reduce((s,t)=>s+(gm[n(t)]||0),0),
    breakdown:Object.entries(teams).map(([pot,team])=>({pot,team,goals:gm[n(team)]||0,out:eliminated.has(n(team))}))
  })).sort((a,b)=>b.pts-a.pts||a.name.localeCompare(b.name));
}

function renderLeaderboard(){
  const gm=computeGoals(),scores=computeScores(gm),top=scores[0]?.pts||0;
  document.getElementById("leaderboard-panel").innerHTML=
    (eliminated.size?'<div class="elim-key">⚫ Greyed out = eliminated</div>':'')+
    scores.map((p,i)=>{
      const pct=top>0?p.pts/top*100:0,isTied=i>0&&scores[i-1].pts===p.pts;
      const rank=isTied?scores.findIndex(s=>s.pts===p.pts)+1:i+1,isTop=i===0,isOpen=expanded===p.name;
      return`<div class="player-card ${isTop?'leader':''} ${isOpen?'open':''}" onclick="toggle('${p.name}')">
        <div class="player-row">
          <div class="rank ${rank<=3?'medal':''}">${rank<=3?MEDALS[rank-1]:rank}</div>
          <div class="player-info">
            <div class="player-name">${p.name}</div>
            <div class="bar-track"><div class="bar-fill ${isTop?'leader':''}" style="width:${pct}%"></div></div>
          </div>
          <div class="player-pts ${isTop?'leader':''}">${p.pts}</div>
          <div class="chevron">${isOpen?'▲':'▼'}</div>
        </div>
        <div class="breakdown ${isOpen?'open':''}">
          ${p.breakdown.map(({pot,team,goals,out})=>`
            <div class="pot-card ${out?'elim':''}" style="background:${POT_BG[pot]};border:1px solid ${POT_COLORS[pot]}33">
              <div>
                <span class="pot-label" style="color:${POT_COLORS[pot]}">POT ${pot}</span>
                <span class="pot-team ${out?'elim':''}">${team}</span>
                ${out?'<span class="elim-tag">⚫ ELIMINATED</span>':''}
              </div>
              <div class="pot-goals ${goals>0?'scored':''}">${goals}</div>
            </div>`).join("")}
        </div>
      </div>`;
    }).join("");
}

function renderResults(){
  const byDate={};
  for(const r of results)(byDate[r.date]=byDate[r.date]||[]).push(r);
  document.getElementById("results-panel").innerHTML=
    Object.entries(byDate).reverse().map(([date,games])=>`
      <div class="date-group">
        <div class="date-label">${date}</div>
        ${games.map(r=>`
          <div class="match-row">
            <span class="match-team home ${eliminated.has(r.home)?'out':''}">${r.home}</span>
            <span class="score-box">${r.et?r.et.home:r.homeGoals} – ${r.et?r.et.away:r.awayGoals}${r.pens?`<div style="font-size:9px;color:#6888aa;letter-spacing:0;font-weight:600;margin-top:1px">(pens ${r.pens.home}-${r.pens.away})</div>`:(r.et?'<div style="font-size:9px;color:#6888aa;letter-spacing:0;font-weight:600;margin-top:1px">AET</div>':'')}</span>
            <span class="match-team ${eliminated.has(r.away)?'out':''}">${r.away}</span>
          </div>`).join("")}
      </div>`).join("")+
    `<p class="footer-note">${results.length} matches · data via openfootball</p>`;
  document.getElementById("match-count").textContent=results.length;
}

function renderUpcoming(){
  const tp=buildTeamPlayers();
  const byDate={};
  for(const m of upcoming)(byDate[m.date]=byDate[m.date]||[]).push(m);
  if(!upcoming.length){
    document.getElementById("upcoming-panel").innerHTML='<p class="footer-note" style="margin-top:40px">No upcoming matches</p>';
    document.getElementById("upcoming-count").textContent="0";
    return;
  }
  document.getElementById("upcoming-panel").innerHTML=
    Object.entries(byDate).map(([date,games])=>`
      <div class="date-group">
        <div class="date-label">${date}</div>
        ${games.map(m=>{
          const hr=resolveTeam(m.home),ar=resolveTeam(m.away);
          const hTags=(tp[hr]||[]).map(p=>{const c=PLAYER_COLORS[p.player]||"#aaa";return`<span class="player-tag" style="background:${c}22;color:${c};border:1px solid ${c}55">${p.player}</span>`;}).join("");
          const aTags=(tp[ar]||[]).map(p=>{const c=PLAYER_COLORS[p.player]||"#aaa";return`<span class="player-tag" style="background:${c}22;color:${c};border:1px solid ${c}55">${p.player}</span>`;}).join("");
          return`<div class="match-row ${hTags||aTags?'interest':''}">
            <div style="flex:1;text-align:right">
              <div class="match-team home ${eliminated.has(hr)?'out':''}">${hr}</div>
              ${hTags?`<div class="player-tags" style="text-align:right">${hTags}</div>`:''}
            </div>
            <div style="text-align:center;flex-shrink:0;min-width:60px">
              <div class="vs-box">vs</div>
              ${m.time?`<div class="match-meta">${m.time}</div>`:''}
              ${m.round?`<div class="match-meta">${m.round}</div>`:''}
            </div>
            <div style="flex:1">
              <div class="match-team ${eliminated.has(ar)?'out':''}">${ar}</div>
              ${aTags?`<div class="player-tags">${aTags}</div>`:''}
            </div>
          </div>`;
        }).join("")}
      </div>`).join("")+
    `<p class="footer-note">${upcoming.length} upcoming · coloured tags = whose team is playing</p>`;
  document.getElementById("upcoming-count").textContent=upcoming.length;
}

function render(){
  const{elim,pm}=calcStandings();
  eliminated=elim;placeholderMap=pm;
  renderLeaderboard();renderResults();renderUpcoming();
}

function toggle(name){expanded=expanded===name?null:name;renderLeaderboard();}

function switchTab(tab){
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",["leaderboard","results","upcoming"][i]===tab));
  ["leaderboard","results","upcoming"].forEach(id=>document.getElementById(id+"-panel").classList.toggle("active",tab===id));
}

function setStatus(msg,type=""){const el=document.getElementById("status");el.textContent=msg;el.className=type;}

async function fetchAll(manual=false){
  const btn=document.getElementById("refresh-btn");
  btn.disabled=true;btn.textContent="Updating…";
  if(manual)setStatus("Fetching latest data…");
  try{
    const res=await fetch(API_URL, {cache:"no-store"});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const data=await res.json();

    const finished=data.matches.filter(m=>m.score&&m.score.ft);
    const unplayed=data.matches.filter(m=>!m.score);

    const newResults=finished.map(m=>{
      const s = m.score;
      // Use ET score for goals if available (includes extra time goals but not penalties)
      const hg = s.et ? s.et[0] : s.ft[0];
      const ag = s.et ? s.et[1] : s.ft[1];
      const r = { date:fmtDate(m.date), home:n(m.team1), homeGoals:hg, awayGoals:ag, away:n(m.team2) };
      if (s.p)  r.pens = { home:s.p[0],  away:s.p[1]  };
      if (s.et && (s.et[0]!==s.ft[0] || s.et[1]!==s.ft[1])) r.et = { home:s.et[0], away:s.et[1] };
      return r;
    }).sort((a,b)=>parseDate(a.date)-parseDate(b.date)||a.home.localeCompare(b.home));

    const newUpcoming=unplayed.map(m=>({
      date:fmtDate(m.date),home:n(m.team1),away:n(m.team2),
      time:bstTime(m.time||""),round:m.group||m.round||""
    }));

    const added=newResults.length-results.length;
    results=newResults;
    upcoming=newUpcoming;
    render();
    const time=new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
    setStatus(manual?(added>0?`Updated ${time} · +${added} new result${added>1?'s':''}`:`Updated ${time} · no new results`):`Last updated ${time} · ${results.length} matches`,added>0?"success":"");
  }catch(e){
    setStatus(`Couldn't fetch: ${e.message} — showing cached data`,"error");
    render();
  }
  btn.disabled=false;btn.textContent="🔄 Refresh Scores";
}

render();
fetchAll(false);
</script>
